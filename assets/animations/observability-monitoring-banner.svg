<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arthur Santos - Observability and Monitoring</title>
  <desc id="desc">Animated observability banner with telemetry nodes, metrics, logs, traces, alerts and dashboards.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#001B3A"/>
      <stop offset="0.42" stop-color="#003E7A"/>
      <stop offset="0.72" stop-color="#0A66C2"/>
      <stop offset="1" stop-color="#D95F02"/>
    </linearGradient>

    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7FDBFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7FDBFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-weight: 800;
        font-size: 54px;
        fill: #ffffff;
      }
      .subtitle {
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-weight: 600;
        font-size: 21px;
        fill: #DDEBFF;
      }
      .label {
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #ffffff;
      }
      .small {
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-weight: 600;
        font-size: 12px;
        fill: #B9D8FF;
      }
      .panel {
        fill: rgba(1, 18, 38, 0.62);
        stroke: rgba(127, 219, 255, 0.25);
        stroke-width: 1;
      }
      .line {
        stroke: #7FDBFF;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 12 18;
        animation: dash 4.8s linear infinite;
        opacity: .82;
      }
      .trace {
        stroke: #FF4B5C;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 7 15;
        animation: dashTrace 3.5s linear infinite;
        opacity: .95;
      }
      .metric {
        stroke: #ffffff;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 540;
        stroke-dashoffset: 540;
        animation: drawMetric 4s ease-in-out infinite;
      }
      .node {
        fill: #071E3A;
        stroke: #7FDBFF;
        stroke-width: 2;
        filter: url(#glow);
      }
      .node-red {
        fill: #2A1120;
        stroke: #FF4B5C;
        stroke-width: 2;
        filter: url(#glow);
      }
      .blink {
        animation: blink 1.8s ease-in-out infinite;
      }
      .pulse {
        animation: pulseScale 2.4s ease-in-out infinite;
        transform-origin: center;
      }
      .float {
        animation: float 5.6s ease-in-out infinite;
      }
      .float2 {
        animation: float 6.4s ease-in-out infinite reverse;
      }
      .bar1 { animation: bar 1.3s ease-in-out infinite; transform-origin: bottom; }
      .bar2 { animation: bar 1.6s ease-in-out infinite .2s; transform-origin: bottom; }
      .bar3 { animation: bar 1.4s ease-in-out infinite .35s; transform-origin: bottom; }
      .bar4 { animation: bar 1.8s ease-in-out infinite .1s; transform-origin: bottom; }
      .scan {
        animation: scan 4.2s ease-in-out infinite;
      }

      @keyframes dash {
        to { stroke-dashoffset: -180; }
      }
      @keyframes dashTrace {
        to { stroke-dashoffset: -120; }
      }
      @keyframes drawMetric {
        0% { stroke-dashoffset: 540; opacity: .4; }
        35% { stroke-dashoffset: 0; opacity: 1; }
        70% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: -540; opacity: .4; }
      }
      @keyframes blink {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }
      @keyframes pulseScale {
        0%, 100% { transform: scale(0.8); opacity: .20; }
        50% { transform: scale(1.2); opacity: .75; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes bar {
        0%, 100% { transform: scaleY(.35); opacity: .5; }
        50% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes scan {
        0% { transform: translateX(-200px); opacity: 0; }
        15% { opacity: .55; }
        85% { opacity: .55; }
        100% { transform: translateX(1200px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="340" rx="28" fill="#000000" opacity="0.18"/>

  <!-- Background grid -->
  <g opacity="0.16">
    <path d="M80 40V300M180 40V300M280 40V300M380 40V300M480 40V300M580 40V300M680 40V300M780 40V300M880 40V300M980 40V300M1080 40V300" stroke="#DDEBFF"/>
    <path d="M50 70H1150M50 120H1150M50 170H1150M50 220H1150M50 270H1150" stroke="#DDEBFF"/>
  </g>

  <!-- Scanning beam -->
  <rect class="scan" x="0" y="38" width="180" height="264" fill="#7FDBFF" opacity=".12"/>

  <!-- Main text -->
  <text x="600" y="118" text-anchor="middle" class="title">Arthur Santos</text>
  <text x="600" y="153" text-anchor="middle" class="subtitle">Monitoring • Observability • APM • SRE • Trade Watch Platform</text>

  <!-- Telemetry flow left -->
  <g class="float">
    <rect x="64" y="78" width="164" height="112" rx="18" class="panel"/>
    <text x="146" y="111" text-anchor="middle" class="label">Telemetry</text>
    <text x="146" y="134" text-anchor="middle" class="small">Metrics • Logs • Traces</text>
    <circle cx="96" cy="160" r="7" fill="#7FDBFF" class="blink"/>
    <circle cx="126" cy="160" r="7" fill="#FF4B5C" class="blink"/>
    <circle cx="156" cy="160" r="7" fill="#D95F02" class="blink"/>
    <circle cx="186" cy="160" r="7" fill="#7FDBFF" class="blink"/>
  </g>

  <path d="M228 134 C300 95, 362 95, 434 134" class="line"/>
  <path d="M228 166 C310 215, 370 220, 448 180" class="trace"/>

  <!-- Central collector node -->
  <g class="float2">
    <circle cx="500" cy="157" r="58" class="node"/>
    <circle cx="500" cy="157" r="86" fill="url(#pulse)" class="pulse"/>
    <text x="500" y="151" text-anchor="middle" class="label">Collector</text>
    <text x="500" y="174" text-anchor="middle" class="small">OpenTelemetry</text>
  </g>

  <path d="M558 156 C650 112, 740 112, 835 156" class="line"/>
  <path d="M558 174 C652 226, 738 226, 835 174" class="trace"/>

  <!-- Right dashboard card -->
  <g class="float">
    <rect x="838" y="70" width="292" height="160" rx="20" class="panel"/>
    <text x="984" y="103" text-anchor="middle" class="label">Observability Dashboard</text>

    <!-- chart -->
    <polyline points="874,180 910,150 944,162 982,123 1024,142 1062,112 1100,128" class="metric"/>
    <circle cx="1062" cy="112" r="6" fill="#FF4B5C" filter="url(#glow)" class="blink"/>

    <!-- bars -->
    <rect x="875" y="126" width="12" height="72" rx="4" fill="#7FDBFF" class="bar1"/>
    <rect x="895" y="106" width="12" height="92" rx="4" fill="#DDEBFF" class="bar2"/>
    <rect x="915" y="142" width="12" height="56" rx="4" fill="#D95F02" class="bar3"/>
    <rect x="935" y="116" width="12" height="82" rx="4" fill="#FF4B5C" class="bar4"/>
  </g>

  <!-- Alert and SLO chips -->
  <g>
    <rect x="318" y="247" width="132" height="40" rx="20" fill="#071E3A" stroke="#7FDBFF" opacity=".95"/>
    <text x="384" y="272" text-anchor="middle" class="label">SLI / SLO</text>

    <rect x="478" y="247" width="132" height="40" rx="20" fill="#071E3A" stroke="#7FDBFF" opacity=".95"/>
    <text x="544" y="272" text-anchor="middle" class="label">APM</text>

    <rect x="638" y="247" width="132" height="40" rx="20" fill="#2A1120" stroke="#FF4B5C" opacity=".95"/>
    <circle cx="665" cy="267" r="7" fill="#FF4B5C" class="blink"/>
    <text x="714" y="272" text-anchor="middle" class="label">Alerts</text>

    <rect x="798" y="247" width="132" height="40" rx="20" fill="#071E3A" stroke="#D95F02" opacity=".95"/>
    <text x="864" y="272" text-anchor="middle" class="label">Runbooks</text>
  </g>

  <!-- Footer line -->
  <path d="M86 304 C288 285, 458 320, 650 302 C818 286, 964 286, 1115 302" stroke="#FF4B5C" stroke-width="3" stroke-linecap="round" opacity=".65"/>
</svg>
